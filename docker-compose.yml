services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "steam_showcase_bot.healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    env_file:
      - steam_showcase_bot/.env
    environment:
      FSM_STORAGE: redis
      REDIS_URL: redis://redis:6379/0
    volumes:
      - gifs:/app/steam_showcase_bot/gifs
      - prepared_gifs:/app/steam_showcase_bot/prepared_gifs
      - sliced_gifs:/app/steam_showcase_bot/sliced_gifs
      - logs:/app/steam_showcase_bot/logs

volumes:
  gifs:
  prepared_gifs:
  sliced_gifs:
  logs:
  redis_data:
